sonar.projectKey=aetherien_svelte-i18n
sonar.organization=aetherien
sonar.projectName=svelte-i18n

# Source files
sonar.sources=.
sonar.exclusions=node_modules/**,coverage/**,*.test.js,jest.config.js,eslint.config.js

# Test files
sonar.tests=.
sonar.test.inclusions=**/*.test.js

# Coverage reports
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=test-report.xml