# GitHub Dependabot configuration.
# Updates:
# - github actions
# - npm packages

version: 2
updates:
  - package-ecosystem: "github-actions"
    # Workflow files stored in the default location of `.github/workflows`
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: "npm"
    # Location of package manifests
    directory: "/"
    schedule:
      interval: "daily"
